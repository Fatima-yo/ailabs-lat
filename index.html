<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>AI Labs LAT</title>
	<style>
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: Georgia, 'Times New Roman', serif;
			background: #ffffff;
			color: #111111;
			line-height: 1.7;
		}

		a { color: #111111; }
		a:hover { opacity: 0.6; }

		/* ── Layout ─────────────────────────────────────────── */
		header, main, footer {
			max-width: 860px;
			margin: 0 auto;
			padding: 0 2rem;
		}

		/* ── Header ─────────────────────────────────────────── */
		header {
			padding-top: 3rem;
			padding-bottom: 3rem;
			border-bottom: 1px solid #111111;
		}

		header h1 {
			font-size: 2rem;
			font-weight: normal;
			letter-spacing: 0.04em;
		}

		/* ── Main content ────────────────────────────────────── */
		main {
			padding-top: 4rem;
			padding-bottom: 4rem;
			min-height: 40vh;
		}

		/* Placeholder — remove when real content is added */
		.placeholder {
			border: 1px dashed #aaaaaa;
			padding: 3rem 2rem;
			text-align: center;
			color: #aaaaaa;
			font-style: italic;
			font-size: 1rem;
		}

		/* ── Contact section ─────────────────────────────────── */
		#contact {
			border-top: 1px solid #111111;
			padding-top: 3rem;
			padding-bottom: 3rem;
			max-width: 860px;
			margin: 0 auto;
			padding-left: 2rem;
			padding-right: 2rem;
		}

		#contact .contact-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 3rem;
			margin-top: 1.5rem;
		}

		@media (max-width: 600px) {
			#contact .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
		}

		.contact-actions {
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
		}

		.btn {
			display: block;
			text-align: center;
			padding: 0.75rem 1.5rem;
			border: 1px solid #111111;
			text-decoration: none;
			font-size: 0.95rem;
			letter-spacing: 0.03em;
			transition: background 0.15s, color 0.15s;
		}

		.btn-primary {
			background: #111111;
			color: #ffffff;
		}

		.btn-primary:hover { background: #333333; color: #ffffff; opacity: 1; }
		.btn:hover { background: #f0f0f0; opacity: 1; }

		.contact-details { list-style: none; }

		.contact-details li {
			margin-bottom: 1.25rem;
		}

		.contact-details h3 {
			font-size: 0.75rem;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			margin-bottom: 0.2rem;
			font-weight: bold;
		}

		.contact-details a {
			font-size: 0.95rem;
			text-decoration: none;
		}

		.contact-details a:hover { text-decoration: underline; opacity: 1; }

		/* ── Footer ─────────────────────────────────────────── */
		footer {
			padding-top: 1.5rem;
			padding-bottom: 2rem;
			border-top: 1px solid #dddddd;
			font-size: 0.8rem;
			color: #888888;
		}
	</style>
</head>
<body>

	<header>
		<h1>AI Labs LAT</h1>
	</header>

	<main>
		<div class="placeholder">Content coming soon.</div>
	</main>

	<section id="contact">
		<p>Get in touch — we'd love to hear from you.</p>
		<div class="contact-grid">
			<div class="contact-actions">
				<a href="https://calendly.com/marcocastiglionem/call-with-marco" target="_blank" class="btn btn-primary">Schedule a Call</a>
				<a href="mailto:hello@theamericasconsulting.com" class="btn">Send Us a Message</a>
			</div>
			<ul class="contact-details">
				<li>
					<h3>Email</h3>
					<a href="mailto:hello@theamericasconsulting.com">hello@theamericasconsulting.com</a>
				</li>
				<li>
					<h3>Phone</h3>
					<a href="tel:+59843726930">+598 4372 6930</a>
				</li>
				<li>
					<h3>Social</h3>
					<a href="https://www.linkedin.com/company/the-americas-consulting-company" target="_blank">LinkedIn</a>
				</li>
			</ul>
		</div>
	</section>

	<footer>
		<p>&copy; 2026 AI Labs LAT. All rights reserved.</p>
	</footer>

</body>
</html>
